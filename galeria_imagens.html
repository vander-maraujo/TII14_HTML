<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Imagens</title>
</head>

<body>
    <h1> Galeria de imagens e Links</h1>

    <!-- ancora alvo para o link "voltar ao topo" -->
    <a id="topo"></a>

    <!-- codigo de símbolo -->
    <p>&#9829;</p>
    <!-- são emoji ( windows+.)-->
    <p>💕🕵🏾</p>

    <hr>

    <h2> Filmes do Tim Burton:</h2>

    <p>
        <a href="#beetlejuice"><img src="img/beetlejuice.webp" alt="Beetlejuice"></a>

        <a href="#chapeleiro"><img src="img/chapeleiro.jpg" alt="Chapeleiro Maluco"></a>

        <a href="#barbeiro"><img src="img/barbeiro.jpg" alt="Sweeney Todd"></a>
    </p>

    <h2>O Beetlejuice</h2>
    <a id="beetlejuice"></a>

    <figure>
        <img src="img/beetlejuice.webp" alt="beetlejuice">
        <figcaption>Beetlejuice, em os Fantasmas se divertem!</figcaption>
    </figure>
</body>

</html>
