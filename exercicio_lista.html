<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista tag</title>
</head>

<body>
        <h1>Lista dentro de Lista</h1>
        <hr>

        <ul>
            <h3>Frutas com tons Amarelo</h3>
            <li>Abacaxi</li>
            <li>Banana</li>
            <li>Carambola</li>
            <li>Damasco</li>
            <ul>
                <li>
                    <h3>Frutas Àcidas</h3>
                    <ol>
                        <li>Laranja</li>
                        <li>Acerola</li>
                    </ol>
                </li>
                <ul>
                    <li>
                        <h3>Frutas Vermelhas</h3>
                        <ol>
                            <li>Framboesa</li>
                            <li>Maçã</li>
                            <li>Amora</li>
                            <li>Morango</li>
                        </ol>
                    </li>
                </ul>
            </ul>
        </ul>
</body>

</html>
