<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variáveis</title>
</head>
<body>
    <script>
        //var - váriáveis . 
        //variaveis declarada com var tem escopo global ou de função. Podem ser atualizadas e declaradas novamente dentro do escopo.

        var nome = "Vander";
        console.log(nome);

        nome= "Maria";
        console.log(nome);

        var nome = "Romeu";
        console.log(nome)

        //let - variáveis declarada com let tem escopo de bloco, podem ser atualizadas, mas não podem ser declaradas novamente

        let idade = 35;
        console.log(idade);

        idade = 55;
        console.log(idade);

        idade = 15
        console.log(idade);

        //const
        //constantes: o valor não pode ser modificado.

        const CIDADE = "São Paulo";
        console.log(CIDADE);

        //CIDADE = "Rio de Janeiro" . Como é uma constante, vai dar erro, porque constante não pode ser alterada.

        let string = "Sou um texto";
        console.log(string);

        //BOLLEAN
        let maiorDeIdade = true;
        let menorDeIdade = false;

        console.log(maiorDeIdade);
        console.log(typeof maiorDeIdade);

        // NUMBER
        idade = 33;
        let preco = 25.90;

        console.log(typeof preco);
        



        
    </script>
</body>
</html>
