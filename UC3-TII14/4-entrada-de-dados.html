<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrada de dados</title>
</head>
<body>
  

      <label for="">Primeiro Numero</label>
      <input type="text" id="num1">
      <label for="">Segundo Numero</label>
      <input type="text" id="num2">
      <button onclick="soma()">Calcular</button>
   
      <p id="resultado"></p>

   <script>
       function soma(){
     
                  //parseInt - transforma tudo que está dentro das aspas em numero inteiro

         //let n1 = parseInt(document.getElementById('num1').value);
         //let n2 = parseInt(document.getElementById('num2').value);

                //parseFloat - identifica os número quebrados (numeros flutuantes)

         let n1 = parseFloat(document.getElementById('num1').value);
         let n2 = parseFloat(document.getElementById('num2').value);
 
 
         let soma = n1 + n2;

         let resultado = document.getElementById('resultado');
         resultado.innerText = soma
        

       }
    </script>
</body>
</html>
