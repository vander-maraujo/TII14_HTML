<!-- Criar um  conversor de celsius para fahrenheit -->
 <!-- (celsius * 9/5)+32-->
 <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>celsius em fahrenheit</title>
</head>
<body>
  
      <h1>Conversor de Celsius para fahrenheit</h1>
      <label for="">Digite o valor em Celsius</label>
      <input type="text" id="celsius">
      <button onclick="converter()">Converter</button>
   
      <p id="resultado"></p>

   <script>
       function converter(){
        
        let celsius = parseFloat(documento.getElementById('celsius').value);
        const calculo = (celsius * 9/5)+32;

        resultado = document.getElementById('resultado');
        resultado.innerText = calculo

        
       }
       
    </script>
</body>
</html>
