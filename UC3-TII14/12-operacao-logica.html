<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //Operadores lógicos
        //Esses operadoressão usados para combinar exppressores logicas

        // operador logico e (&&): Retorna verdadeiro (true) se ambas as expressoes forem verdadeiras

        //operador logico OU (||): Retorna verdadeiro (true) se pelo menos uma das expressoes forem verdadeira.

        let nome = true
        let senha = true

        let resultado= nome && senha
        console.log(resultado)

        nome = "Vander"
        senha = "9090"

        resultado = nome == "Vander" && senha == "9090"

        console.log(resultado)

        //operador logico OU ||: Retorna verdadeiro (true) se pelo menos uma expressao for verdadeira

        nome = "Vander"
        senha = "9090"

        resultado = nome == "Vander" || senha == "9090"

        console.log(resultado)

    </script>

</body>
</html>
