<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operadores Relacionais</title>
</head>
<body>
    <script>
        //Operadores relacionais
        // Esses operadores sao usados para comparar dois valores e retornam um valor lógico (verdadeiro ou falso).

        let num1 = 35;
        let num2 = 5;

        // Igual a (==) : verifica se dois valores são iguais
        let igualdade = num1 == num2;
        console.log(igualdade);

        console.log(5 == "5"); // true (a string "5" é convertida para número 5)
        console.log(true == 1); // true é convertido para 1
        console.log(false == 0); // true (false é convertido para 0)
        console.log(null == undefined) // true (ambos são considerados iguais em comparação soltas)

        //igualdade a (===): verifica se dois valores são iguais e do mesmo tipo
        let igualdadeValorTipo = num1 = num2;
        console.log(igualdadeValorTipo);

        console.log(5 === "5"); 
        console.log(true === 1); 
        console.log(false === 0);
        console.log(null === undefined) // todos vão retornar falso

        //Diferente de (!=): verifica se dois valores sao diferentes
        console.log(5 != "5") //false
        console.log(true != 1) //false

        //Diferente de (!=): verifica se dois valores sao diferentes e do mesmo tipo
        console.log(5 != "5") //true
        console.log(true != 1) //true

        //Maior que (>): Verifica se um valor é maior que o outro
        console.log(5 > 6)
        console.log(9 > 7)
        console.log(5 > 5)


        //Maior que (>): Verifica se um valor é menor que o outro
        console.log(5 < 6) //true
        console.log(9 < 7) //false
        console.log(5 < 5) //true

        //Maior ou igual (>=): Verifica se um valor é maior ou igual ao outro
         console.log(5 >= 6) //false
        console.log(9 >= 7) //true
        console.log(5 >= 5) //true

        //Maior ou igual (<=): Verifica se um valor é menor ou igual ao outro
         console.log(5 <= 6) //true
        console.log(9 <= 7) //false
        console.log(5 <= 5) //true



    </script>
</body>
</html>
