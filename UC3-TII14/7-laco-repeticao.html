<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laço de Repetição</title>
</head>
<body>
    <script>
        console.log('passo 1')
        console.log('passo 2')
        console.log('passo 3')
        console.log('passo 4')
        console.log('passo 5')
        console.log('passo 6')
        console.log('passo 7')
        console.log('passo 8')
        console.log('passo 9')
        console.log('passo 10')

        
        let num = parseInt(prompt('digite um numero'))


    for (i=1;i<=10;i++){  // i++ = i+1
        console.log('Passo '+ i)
    }    
    for (i=10;i>=1;i--){  // i-- = i-1
        console.log('Passo '+ i)
    }    

    for(let i=0; i<=10; i++){
        //console.log(i + ' x ' + num ' = ' + i * num)
        console.log(`${i} x ${num} = ${i*num}`)
    }

     


    </script>
</body>
</html>
