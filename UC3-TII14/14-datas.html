<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datas</title>
</head>
<body>
    <script>
        // objeto Date
        // O Date é usado para representar data e horários. Ele permite criar, manipular e formatar datas.
        // Data atual

        console.log(new Date()); //Exibe a data e hora atual.

        // Data especifica (ano, mes, dia, hora, minuto, segundos).
        console.log(new Date(1990, 7, 11, 12, 0, 35)); // 11 de Agosto de 1990 às 12:00:35

        // Data a partir de uma string
        console.log(new Date ("1990-08-11T12:00:35Z")) // ISO 8601

        const data = new Date(); 
        console.log(data.getFullYear()); //ano atual
        console.log(data.getMonth()); //mes atual
        console.log(data.getDate()); //dia do mes
        console.log(data.getDay()) //dia da semana
        console.log(data.getHours());//hora
        console.log(data.getMinutes());//minutos
        console.log(data.getSeconds());//segundos
        console.log(data.getMilliseconds());//milisegundos
        console.log(data.getTime()); //retorna o timestamp (milissegundos desde 1° de janeiro de 1970 - 'Unix Epoch')

        //Timestamp

        //O timestamp é um número que representa quantidade de milissegundos desde 1 de janeiro de 1970 (conhecido como Unix Epoch)

        var timestamp  = Date.now(); // retorna a timestamp atual

        console.log(timestamp);

        dataAtual = new Date (timestamp);
        console.log(dataAtual);


        //Formatação de data

        var dia = data.getDate();
        var mes = data.getMonth() + 1;
        var ano = data.getFullYear();

        console.log(`${dia} /${mes}/${ano}`);

        // Diferença entre datas
        //Você pode calcular a diferença entre duas datas subtraindo seus timestamp
;
        var data1 = new Date(2026, 5, 12)
        var data2 = new Date(2026, 5, 15)

        var diferenca = data2 - data1;
        console.log(diferenca)

        var dias = diferenca / (1000 * 60 * 60 * 24)
        console.log(dias)

        let timestampDia = 86400000;
        let qtdDia = 5;
        let calculo = timestampDia * qtdDia;

        console.log(calculo)

        var dias = calculo / (1000 * 60 * 60 * 24);
        console.log(dias);

        // fusos horários (times zones)

        let formatador = new Intl.DateTimeFormat(
            'pt-Br',
            {
                timeZone: 'America/Sao_Paulo',
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit",
            }
        );
        console.log(formatador.format(data))

        console.log(data.toLocaleDateString())
        
    </script>
    
</body>
</html>
