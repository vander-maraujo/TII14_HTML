<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalhando com imagens</title>
</head>

<body>
    <h1>Trabalhando com imagens</h1>
    <p>O Uso da tag <b>IMG</b> e os atributos <b>
            src</b> e <b>alt</b>.</p>


    <p>
        <!-- Tag <img> insere imagem no fluxo de conteudo -->
        <img src="img/gatinho.jpg" alt="Um gatinho lindo">
        <!--  src: caminho para o arquivo de imagem
          alt: texto alternativo para acessibilidade e SEo.
          obs: Recomendado evitar imagens sem alt -->
    </p>

    <figure>
        <!-- <figure> tag que agrupa a imagem com a legenda semântica -->
         <img src="img/naruto.webp" alt="Imagem do naruto">
         <!-- Legenda da figura -->
         <figcaption>
            Imagem do melhor anime desse mundo
         </figcaption>
    </figure>
</body>

</html>
